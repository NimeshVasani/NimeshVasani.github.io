name: Build Tailwind CSS

on:
  push:
    branches:
      - main  # Make sure this matches your default branch name

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js (Removed the strict cache rule)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install Tailwind locally on the runner
      - name: Install dependencies
        run: npm install

      # Step 4: Run the Tailwind compilation script from your package.json
      - name: Build CSS
        run: npm run build

      # Step 5: Commit the brand-new, tiny compiled CSS file back to your project
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add dist/output.css || true
          
          if ! git diff --cached --quiet; then
            git commit -m "build(css): compile tailwind production assets [skip ci]"
            git push
          else
            echo "No changes to build files."
          fi

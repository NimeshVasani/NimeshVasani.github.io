<!-- home.html -->

<div id="particles-js" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0;"></div>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/r17/Stats.min.js"></script>
<script>
  window.onload = function() {
    particlesJS("particles-js", {
      "particles": {
        "number": {
          "value": 130,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        "color": {
          "value": "#ffffff"
        },
        "shape": {
          "type": "circle",
          "stroke": {
            "width": 0,
            "color": "#000000"
          },
          "polygon": {
            "nb_sides": 5
          },
          "image": {
            "src": "img/github.svg",
            "width": 100,
            "height": 100
          }
        },
        "opacity": {
          "value": 0.5,
          "random": false,
          "anim": {
            "enable": false,
            "speed": 1,
            "opacity_min": 0.1,
            "sync": false
          }
        },
        "size": {
          "value": 3,
          "random": true,
          "anim": {
            "enable": false,
            "speed": 40,
            "size_min": 0.1,
            "sync": false
          }
        },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#ffffff",
          "opacity": 0.4,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 6,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false,
          "attract": {
            "enable": false,
            "rotateX": 600,
            "rotateY": 1200
          }
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": true,
            "mode": "grab"
          },
          "onclick": {
            "enable": true,
            "mode": "push"
          },
          "resize": true
        },
        "modes": {
          "grab": {
            "distance": 140,
            "line_linked": {
              "opacity": 1
            }
          },
          "bubble": {
            "distance": 400,
            "size": 40,
            "duration": 2,
            "opacity": 8,
            "speed": 3
          },
          "repulse": {
            "distance": 200,
            "duration": 0.4
          },
          "push": {
            "particles_nb": 4
          },
          "remove": {
            "particles_nb": 2
          }
        }
      },
      "retina_detect": true
    });

    // Initialize stats.js
    var stats = new Stats();
    stats.showPanel(0); // 0: fps, 1: ms, 2: mb, 3+: custom
    document.body.appendChild(stats.dom);

    function animate() {
      stats.begin();
      // monitored code goes here
      stats.end();
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  };
</script>

<style>
    /* Custom Keyframe Animations for a flawless transition sequence */
    @keyframes slideFromLeft {
        0% {
            transform: translateX(-80px);
            opacity: 0;
        }
        100% {
            transform: translateX(0);
            opacity: 1;
        }
    }

    @keyframes fadeIn {
        0% {
            opacity: 0;
            transform: translateY(15px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Animation Classes */
    .animate-slide-left {
        animation: slideFromLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-fade-in {
        opacity: 0; /* Keep hidden initially */
        animation: fadeIn 0.8s ease-out 0.8s forwards; /* 0.8s delay starts after name finishes */
    }
</style>

<section id="home" class="min-h-screen flex flex-col justify-between pt-28 px-8 pb-8 relative font-mono bg-[#0B0F19]">
    
    <!-- Hero content wrapper (Centered layout, Left-aligned text) -->
    <div class="max-w-4xl mx-auto my-auto w-full space-y-6">
        
        <!-- Animated Intro Block (Slides from Left) -->
        <div class="animate-slide-left space-y-4">
            <!-- "Hi, I am —" -->
            <div class="flex items-center gap-3 text-gray-300 text-base md:text-lg tracking-wider">
                <span>Hi, I am</span>
                <span class="w-10 h-[3px] bg-[#E14D4D] mt-1"></span>
            </div>
            
            <!-- Large Italicized Name -->
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tight text-white select-none">
                Nimesh Vasani

            <!-- [ MOBILE APPLICATION DEVELOPER ] -->
            <p class="text-xl md:text-2xl font-bold tracking-widest text-[#E14D4D] uppercase">
                [ Mobile Application Developer ]
            </p>

        <!-- Animated Description (Fades in after name finishes) -->
        <div class="animate-fade-in space-y-8">

                Passionate mobile app developer committed to crafting and enhancing user-centric, high-impact applications for global enterprises. Proficient with Android, iOS, and Flutter.
            </p>
            
            <!-- Navigation Action Buttons -->
            <div class="flex flex-wrap gap-4 pt-2 font-sans">
                <a href="#projects" class="px-6 py-3 bg-[#E14D4D] text-white font-semibold rounded-lg shadow-lg hover:bg-[#c93f3f] transition duration-200">
                    View My Work
                </a>
                <a href="#contact" class="px-6 py-3 border border-gray-700 hover:border-[#E14D4D]/50 rounded-lg font-medium text-gray-300 transition duration-200">
                    Get In Touch
                </a>
            </div>
        </div>
    </div>

    <!-- Red Rounded-Pill Scroll Button (Disappears on Scroll) -->
    <div class="flex justify-center w-full pb-6">
        <button id="scroll-to-next-btn" class="flex flex-col items-center gap-2 text-gray-400 hover:text-[#E14D4D] transition-all duration-500 focus:outline-none group">
            <div class="w-8 h-14 rounded-full border border-[#E14D4D] flex items-center justify-center p-1 transition duration-300">
                <!-- Smooth scrolling arrow -->
                <span class="text-[#E14D4D] font-bold text-lg leading-none animate-bounce mt-1">↓</span>
            </div>
        </button>
    </div>
</section>

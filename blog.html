
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Nimesh Vasani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #0B0F19;
        }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex flex-col justify-between">

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Main Blog Content -->
    <main class="max-w-6xl mx-auto px-6 py-16 flex-grow w-full">
        <div class="mb-12">
            <h1 class="text-4xl font-extrabold text-white mb-4">All Posts</h1>
            <div class="h-1 w-20 bg-[#E14D4D]"></div>
        </div>

        <!-- Blog Grid Container -->
        <div id="blog-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loading Skeleton States -->
            <div class="animate-pulse bg-[#161D30] rounded-xl border border-gray-800 h-96"></div>
            <div class="animate-pulse bg-[#161D30] rounded-xl border border-gray-800 h-96 hidden md:block"></div>
            <div class="animate-pulse bg-[#161D30] rounded-xl border border-gray-800 h-96 hidden lg:block"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-900 bg-[#0B0F19] py-8 mt-12 text-center text-sm text-gray-500">
        <p>&copy; 2026 Nimesh Vasani. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="blog.js"></script>
</body>
</html>

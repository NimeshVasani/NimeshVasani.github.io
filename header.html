    <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        
      
        
        <!-- Column 2: Center (Tabs) -->
        <div class="hidden md:flex justify-center space-x-8 text-sm font-medium tracking-wide text-gray-300">
            <a href="#home" class="hover:text-[#D4AF37] transition duration-200">Home</a>
